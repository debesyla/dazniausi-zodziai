name: Verify application

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Checkout reviewed source snapshot
        uses: actions/checkout@v5
        with:
          repository: debesyla/dazniausi-zodziai-sources
          ref: d1f4c06e93d4142ec3c42a3c1d02c06b6a301e13
          path: .sources
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Verify reviewed datasets
        run: npm run data:verify -- --source-root .sources

      - name: Build public data products
        run: npm run products:build -- --source-root .sources

      - name: Verify public data products
        run: npm run products:verify

      - name: Production build
        env:
          NODE_ENV: production
        run: npm run build
