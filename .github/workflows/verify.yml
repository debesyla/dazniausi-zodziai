name: Verify application

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Test
        run: npm test

      - name: Install browser matrix for release tests
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Test production browser matrix
        run: npm run test:browser

      - name: Upload browser-test artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

      - name: Verify checked-in public data products
        run: npm run products:verify

      - name: Production build
        env:
          NODE_ENV: production
        run: npm run build
